name: Rust CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.ferrflow'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
      - '.ferrflow'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -W clippy::pedantic

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release --all
      - run: cargo test --release -- --ignored

  build:
    name: Build Release (${{ matrix.target }})
    needs: [fmt, clippy, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        shell: bash
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p headway

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          staging="headway-${{ matrix.target }}"
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/headway "$staging/"
          cp LICENSE README.md "$staging/"
          tar czf "$staging.tar.gz" "$staging"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "headway-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging
          Copy-Item "target/${{ matrix.target }}/release/headway.exe" "$staging/"
          Copy-Item LICENSE, README.md "$staging/"
          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: headway-${{ matrix.target }}
          path: |
            headway-${{ matrix.target }}.tar.gz
            headway-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.FERRFLOW_TOKEN }}
      - uses: FerrFlow-Org/ferrflow@v2
        with:
          dry_run: ${{ inputs.dry_run }}
        env:
          FERRFLOW_TOKEN: ${{ secrets.FERRFLOW_TOKEN }}

  attach-assets:
    name: Attach Release Assets
    needs: [build, release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ secrets.FERRFLOW_TOKEN }}
        run: |
          tag=$(gh release list --limit 10 --json tagName \
                --jq 'first(.[] | select(.tagName | startswith("cli@"))) | .tagName')
          if [ -z "$tag" ]; then
            echo "No cli release tag found, skipping asset upload"
            exit 0
          fi
          echo "Uploading assets to release: $tag"
          for dir in artifacts/headway-*; do
            file=$(find "$dir" -type f \( -name '*.tar.gz' -o -name '*.zip' \))
            if [ -n "$file" ]; then
              gh release upload "$tag" "$file" --clobber
            fi
          done
