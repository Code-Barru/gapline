name: Rust CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.ferrflow'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'cli/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/**'
      - '.ferrflow'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -W clippy::pedantic -Dwarnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release --all
      - run: cargo test --release -- --ignored

  build-check:
    name: Build Check
    needs: [fmt, clippy, test]
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/build-targets.yml
    with:
      upload: false

  release:
    name: Release
    needs: [fmt, clippy, test]
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      new_ref: ${{ steps.ref.outputs.sha }}
      cli_tag: ${{ steps.ref.outputs.cli_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.FERRFLOW_TOKEN }}
      - uses: FerrLabs/FerrFlow@v4
        with:
          dry_run: ${{ inputs.dry_run }}
        env:
          FERRFLOW_TOKEN: ${{ secrets.FERRFLOW_TOKEN }}

      - id: ref
        name: Capture ferrflow commit and cli tag
        env:
          GH_TOKEN: ${{ secrets.FERRFLOW_TOKEN }}
        run: |
          git fetch --tags origin
          git pull --ff-only origin main || true
          sha=$(git rev-parse HEAD)
          cli_tag=$(git tag --points-at "$sha" | grep '^cli@' | head -n1 || true)
          if [ -z "$cli_tag" ]; then
            cli_tag=$(gh release list --limit 10 --json tagName \
                      --jq 'first(.[] | select(.tagName | startswith("cli@"))) | .tagName')
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "cli_tag=$cli_tag" >> "$GITHUB_OUTPUT"

      - name: Ensure latest CLI release is marked as latest
        if: steps.ref.outputs.cli_tag != ''
        env:
          GH_TOKEN: ${{ secrets.FERRFLOW_TOKEN }}
        run: gh release edit "${{ steps.ref.outputs.cli_tag }}" --latest

  build-release:
    name: Build Release Artifact
    needs: [release]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/build-targets.yml
    with:
      ref: ${{ needs.release.outputs.new_ref }}
      upload: true

  attach-assets:
    name: Attach Release Assets
    needs: [build-release, release]
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.release.outputs.cli_tag != ''
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.release.outputs.new_ref }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          checksums_file="checksums.sha256"
          for dir in artifacts/gapline-*; do
            file=$(find "$dir" -type f \( -name '*.tar.gz' -o -name '*.zip' \))
            if [ -n "$file" ]; then
              hash=$(sha256sum "$file" | cut -d ' ' -f 1)
              name=$(basename "$file")
              echo "$hash  $name" >> "$checksums_file"
            fi
          done

      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ secrets.FERRFLOW_TOKEN }}
        run: |
          tag="${{ needs.release.outputs.cli_tag }}"
          echo "Uploading assets to release: $tag"
          for dir in artifacts/gapline-*; do
            file=$(find "$dir" -type f \( -name '*.tar.gz' -o -name '*.zip' \))
            if [ -n "$file" ]; then
              gh release upload "$tag" "$file" --clobber
            fi
          done
          if [ -f checksums.sha256 ]; then
            gh release upload "$tag" checksums.sha256 --clobber
          fi
