name: Proto upstream check

on:
  push:
    branches: [main]
    paths:
      - 'proto/gtfs-realtime.proto'
      - '.github/workflows/proto-upstream-check.yml'
  pull_request:
    branches: [main]
    paths:
      - 'proto/gtfs-realtime.proto'
      - '.github/workflows/proto-upstream-check.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  diff:
    name: Diff vendored proto vs MobilityData upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Fetch upstream gtfs-realtime.proto
        run: curl -fsSL -o /tmp/upstream.proto https://raw.githubusercontent.com/google/transit/master/gtfs-realtime/proto/gtfs-realtime.proto
      - name: Diff against vendored copy
        run: diff -u proto/gtfs-realtime.proto /tmp/upstream.proto
